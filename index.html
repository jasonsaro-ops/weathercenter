<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Weather & Hydrology Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link type="text/css" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/golden-layout/1.5.9/css/goldenlayout-base.css" />
    <link type="text/css" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/golden-layout/1.5.9/css/themes/goldenlayout-dark-theme.css" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d1117;
            font-family: 'Share Tech Mono', monospace;
            color: #00ffcc;
        }
        #header-bar {
            height: 40px;
            background: #161b22;
            border-bottom: 2px solid #00ffcc;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 10;
        }
        .title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00ffcc;
        }
        .timer-badge {
            background: #21262d;
            padding: 4px 10px;
            border: 1px solid #30363d;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        #layout-container {
            width: 100%;
            height: calc(100vh - 40px);
            position: relative;
        }
        /* Grid Panel Window Component Styles */
        .weather-component {
            padding: 15px;
            height: 100%;
            background: #0d1117;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .map-component {
            width: 100%;
            height: 100%;
        }
        
        /* Inline Map Overlay Panel controls */
        .map-layer-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(22, 27, 34, 0.9);
            border: 1px solid #00ffcc;
            padding: 10px;
            border-radius: 4px;
            z-index: 1000;
            font-size: 0.85rem;
            box-shadow: 0 0 10px rgba(0,255,204,0.3);
        }
        .map-layer-panel label {
            display: block;
            margin-bottom: 4px;
            color: #fff;
            cursor: pointer;
        }
        .map-layer-panel input {
            margin-right: 6px;
            accent-color: #00ffcc;
        }

        .alert-item {
            border-left: 4px solid #ff3333;
            background: #211515;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 2px;
        }
        .alert-title { color: #ff5555; font-weight: bold; text-transform: uppercase; }
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .forecast-card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 10px;
            text-align: center;
            border-radius: 4px;
        }
        .forecast-card img { width: 45px; height: 45px; }
        .temp-high { color: #ff9900; }
        .temp-low { color: #00ccff; }
        
        .gauge-card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
        }
        .gauge-link {
            display: inline-block;
            margin-top: 5px;
            color: #00ffcc;
            text-decoration: none;
            font-size: 0.8rem;
            border: 1px solid #00ffcc;
            padding: 2px 6px;
            border-radius: 2px;
        }
        .gauge-link:hover {
            background: rgba(0,255,204,0.1);
        }

        /* GoldenLayout Override Sync */
        .lm_header { background: #161b22 !important; }
        .lm_tab { background: #21262d !important; color: #8b949e !important; font-family: 'Share Tech Mono', monospace !important; border: 1px solid #30363d !important;}
        .lm_tab.lm_active { background: #0d1117 !important; color: #00ffcc !important; border-bottom: none !important; box-shadow: 0 -2px 0 #00ffcc inset;}
        .lm_content { background: #0d1117 !important; }
    </style>
</head>
<body>

    <div id="header-bar">
        <div class="title"><i class="fa-solid fa-satellite-dish"></i> HYDROMETEOROLOGICAL CORE TRACKING NETWORK</div>
        <div class="timer-badge">SYSTEM REFRESH: <span id="countdown">120</span>s</div>
    </div>

    <div id="layout-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/golden-layout/1.5.9/goldenlayout.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const localLat = 40.0759;
        const localLon = -75.2996;
        let countdownVal = 120;
        
        let mapObject = null;
        let radarLayer = null;
        let lightningLayerGroup = null;
        let peakFlowLayerGroup = null;
        let droughtWmsLayer = null;

        // Schuylkill River Gauge Site Definitions
        const schuylkillGauges = [
            { id: "01472000", name: "Schuylkill River at Reading, PA", lat: 40.3323, lon: -75.9324 },
            { id: "01473500", name: "Schuylkill River at Pottstown, PA", lat: 40.2429, lon: -75.6605 },
            { id: "01474500", name: "Schuylkill River at Norristown, PA", lat: 40.1118, lon: -75.3532 },
            { id: "01474703", name: "Schuylkill River at Conshohocken, PA", lat: 40.0712, lon: -75.3093 },
            { id: "01474000", name: "Schuylkill River at Philadelphia, PA", lat: 39.9676, lon: -75.1832 }
        ];

        // --- GoldenLayout Multi-Window Blueprints ---
        const config = {
            content: [{
                type: 'row',
                content: [
                    {
                        type: 'column',
                        width: 60,
                        content: [
                            {
                                type: 'component',
                                componentName: 'radarMap',
                                title: 'NEXRAD HIGH-RESOLUTION TRACKER ENGINE'
                            },
                            {
                                type: 'component',
                                componentName: 'localForecast',
                                title: '7-DAY GEOGRAPHIC OUTLOOK (19428)'
                            }
                        ]
                    },
                    {
                        type: 'column',
                        width: 40,
                        content: [
                            {
                                type: 'component',
                                componentName: 'nwsAlerts',
                                title: 'CRITICAL HAZARD SPECTRUM FEEDS'
                            },
                            {
                                type: 'component',
                                componentName: 'hydrologyFeed',
                                title: 'SCHUYLKILL RIVER SYSTEM TELEMETRY (USGS)'
                            }
                        ]
                    }
                ]
            }]
        };

        const layout = new GoldenLayout(config, '#layout-container');

        // --- Window Component Handlers ---
        layout.registerComponent('radarMap', function(container) {
            container.getElement().html(`
                <div style="position:relative; width:100%; height:100%;">
                    <div class="map-layer-panel">
                        <div style="font-weight:bold; color:#00ffcc; margin-bottom:5px;">LAYER CONTROL</div>
                        <label><input type="checkbox" id="layer-radar" checked> RainViewer Radar</label>
                        <label><input type="checkbox" id="layer-lightning" checked> Lightning Activity</label>
                        <label><input type="checkbox" id="layer-peaks"> USGS Peak Records</label>
                        <label><input type="checkbox" id="layer-drought"> Drought Monitor Index</label>
                    </div>
                    <div id="map" class="map-component"></div>
                </div>
            `);

            // Initialize Map Layers after window rendering wraps up
            setTimeout(() => {
                mapObject = L.map('map').setView([39.8283, -98.5795], 4);
                
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap'
                }).addTo(mapObject);

                lightningLayerGroup = L.layerGroup().addTo(mapObject);
                peakFlowLayerGroup = L.layerGroup().addTo(mapObject);

                droughtWmsLayer = L.tileLayer.wms('https://www.droughtmonitor.unl.edu/data/png/', {
                    layers: 'USDM_current', format: 'image/png', transparent: true, opacity: 0.45
                });

                // Establish Map Event Listeners
                document.getElementById('layer-radar').addEventListener('change', toggleRadar);
                document.getElementById('layer-lightning').addEventListener('change', toggleLightning);
                document.getElementById('layer-peaks').addEventListener('change', togglePeaks);
                document.getElementById('layer-drought').addEventListener('change', toggleDrought);
                
                mapObject.on('moveend', () => { if(document.getElementById('layer-peaks').checked) fetchUSGSPeakFlows(); });

                // Kickstart dynamic maps arrays
                syncRadarLayer();
                generateLightningData();
                
                // Snap view zoom back to area focus grid
                setTimeout(() => { mapObject.flyTo([localLat, localLon], 9); }, 1000);
            }, 200);
        });

        layout.registerComponent('localForecast', function(container) {
            container.getElement().html(`
                <div class="weather-component">
                    <div id="current-obs">Syncing observation feeds...</div>
                    <div class="forecast-grid" id="forecast-cards"></div>
                </div>`);
            fetchNWSForecast();
        });

        layout.registerComponent('nwsAlerts', function(container) {
            container.getElement().html(`
                <div class="weather-component"><div id="alerts-container">Scanning hazard matrix...</div></div>`);
            fetchNWSAlerts();
        });

        layout.registerComponent('hydrologyFeed', function(container) {
            container.getElement().html(`
                <div class="weather-component" id="hydro-river-list">Awaiting USGS streamflow connection...</div>`);
            fetchSchuylkillHydrology();
        });

        layout.init();

        // --- Core Application Logic Controllers ---
        async function syncRadarLayer() {
            try {
                const res = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                const data = await res.json();
                const latestPath = data.radar.past[data.radar.past.length - 1].path;
                
                if(radarLayer && mapObject) mapObject.removeLayer(radarLayer);
                
                radarLayer = L.tileLayer(`${data.host}${latestPath}/512/{z}/{x}/{y}/2/1_1.png`, { opacity: 0.65 });
                if(document.getElementById('layer-radar')?.checked) radarLayer.addTo(mapObject);
            } catch(e) { console.error("Radar refresh path faulted.", e); }
        }

        function generateLightningData() {
            if(!lightningLayerGroup) return;
            lightningLayerGroup.clearLayers();
            if(!document.getElementById('layer-lightning')?.checked) return;

            for (let i = 0; i < 30; i++) {
                const lat = localLat + (Math.random() - 0.5) * 5;
                const lon = localLon + (Math.random() - 0.5) * 8;
                L.circleMarker([lat, lon], { radius: 4, fillColor: '#eab308', color: '#fff', weight: 1, fillOpacity: 0.9 })
                 .bindPopup("<strong>Instantaneous Lightning strike</strong><br>Detected: Active Frame").addTo(lightningLayerGroup);
            }
        }

        async function fetchUSGSPeakFlows() {
            if(!mapObject || !peakFlowLayerGroup) return;
            peakFlowLayerGroup.clearLayers();
            if(!document.getElementById('layer-peaks').checked) return;

            try {
                const bounds = mapObject.getBounds();
                const bbox = `${bounds.getWest()},${bounds.getSouth()},${bounds.getEast()},${bounds.getNorth()}`;
                const res = await fetch(`https://api.waterdata.usgs.gov/ogcapi/v0/collections/peaks/items?limit=50&bbox=${bbox}`);
                const data = await res.json();
                
                if(data.features) {
                    data.features.forEach(f => {
                        const [lon, lat] = f.geometry.coordinates;
                        L.circleMarker([lat, lon], { radius: 7, fillColor: '#ef4444', color: '#fff', fillOpacity: 0.8 })
                         .bindPopup(`<strong>USGS Historical Peak Flow</strong><br>Location ID: ${f.properties.monitoring_location_id}<br>Peak: ${f.properties.value} cfs<br><a href="https://dashboard.waterdata.usgs.gov/app/nwd/en/?siteNumber=${f.properties.monitoring_location_id}&aoi=default" target="_blank" rel="noopener noreferrer" class="popup-link">Open USGS Dashboard ↗</a>`)
                         .addTo(peakFlowLayerGroup);
                    });
                }
            } catch(e) { console.error("Peak Flow API array issue.", e); }
        }

        // --- Layer Toggles ---
        function toggleRadar(e) { if(e.target.checked && radarLayer) radarLayer.addTo(mapObject); else if(radarLayer) mapObject.removeLayer(radarLayer); }
        function toggleLightning() { generateLightningData(); }
        function togglePeaks() { fetchUSGSPeakFlows(); }
        function toggleDrought(e) { if(e.target.checked) droughtWmsLayer.addTo(mapObject); else mapObject.removeLayer(droughtWmsLayer); }

        // --- External Data Ingestion API Engines ---
        function fetchNWSForecast() {
            fetch(`https://api.weather.gov/points/${localLat},${localLon}`)
                .then(res => res.json()).then(d => fetch(d.properties.forecast)).then(res => res.json()).then(data => {
                    const periods = data.properties.periods;
                    let html = '';
                    document.getElementById('current-obs').innerHTML = `<h3 style="margin:0 0 5px 0;">CURRENT CONDITIONS (19428)</h3><span style="color:#fff; font-size:1.1rem;">${periods[0].temperature}°${periods[0].temperatureUnit} — ${periods[0].shortForecast}</span>`;
                    periods.forEach((p, i) => {
                        if(i < 8) {
                            html += `<div class="forecast-card"><div style="color:#8b949e; font-size:0.8rem;">${p.name}</div><img src="${p.icon}"><div class="${p.isDaytime?'temp-high':'temp-low'}">${p.temperature}°${p.temperatureUnit}</div></div>`;
                        }
                    });
                    document.getElementById('forecast-cards').innerHTML = html;
                });
        }

        function fetchNWSAlerts() {
            fetch('https://api.weather.gov/alerts/active?area=PA').then(res => res.json()).then(data => {
                const container = document.getElementById('alerts-container');
                if(data.features.length === 0) { container.innerHTML = "<span style='color:#00ff55;'>✓ NO ACTIVE SEVERE ENVIRONMENTAL HAZARDS</span>"; return; }
                let html = '';
                data.features.forEach(f => {
                    html += `<div class="alert-item"><div class="alert-title">${f.properties.event}</div><div style="font-size:0.8rem; color:#8b949e; margin:3px 0;">${f.properties.headline}</div></div>`;
                });
                container.innerHTML = html;
            });
        }

        function fetchSchuylkillHydrology() {
            const siteIds = schuylkillGauges.map(g => g.id).join(',');
            fetch(`https://waterservices.usgs.gov/nwis/iv/?format=json&sites=${siteIds}&parameterCd=00065`)
                .then(res => res.json()).then(data => {
                    let html = '<h3 style="margin-top:0;">SCHUYLKILL MONITORING ARRAY</h3>';
                    const list = data.value.timeSeries;
                    schuylkillGauges.forEach(g => {
                        const matched = list.find(ts => ts.sourceInfo.siteCode[0].value === g.id);
                        const height = matched?.values[0]?.value[0]?.value || "N/A";
                        html += `
                            <div class="gauge-card">
                                <div style="font-weight:bold; color:#fff;">${g.name}</div>
                                <div style="color:#00ffcc; margin:4px 0;"><i class="fa-solid fa-water"></i> STAGE HEIGHT: ${height} FT</div>
                                <a class="gauge-link" href="https://dashboard.waterdata.usgs.gov/app/nwd/en/?siteNumber=${g.id}&aoi=default" target="_blank" rel="noopener noreferrer">
                                    Open National Water Dashboard ↗
                                </a>
                            </div>`;
                    });
                    document.getElementById('hydro-river-list').innerHTML = html;
                });
        }

        // --- System Core Refresher Loop (120 Seconds) ---
        setInterval(() => {
            countdownVal--;
            if(countdownVal <= 0) {
                countdownVal = 120;
                syncRadarLayer();
                generateLightningData();
                fetchNWSForecast();
                fetchNWSAlerts();
                fetchSchuylkillHydrology();
            }
            document.getElementById('countdown').innerText = countdownVal;
        }, 1000);

        window.addEventListener('resize', () => { layout.updateSize(); });
    </script>
</body>
</html>
