<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrated Weather Monitor Hub Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/src/css/goldenlayout-base.css" />
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/src/css/goldenlayout-dark-theme.css" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d1117;
            font-family: 'Share Tech Mono', monospace;
            color: #00ffcc;
        }
        #header-bar {
            height: 40px;
            background: #161b22;
            border-bottom: 2px solid #00ffcc;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 100;
        }
        .title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00ffcc;
        }
        .timer-badge {
            background: #21262d;
            padding: 4px 10px;
            border: 1px solid #30363d;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        /* Layout Framework Viewports */
        #desktopLayoutContainer {
            width: 100%;
            height: calc(100vh - 40px);
            position: relative;
            display: none;
        }
        #mobileLayoutContainer {
            display: none;
            width: 100%;
            height: calc(100vh - 40px);
            overflow-y: auto;
            box-sizing: border-box;
            padding: 12px;
            background: #0d1117;
        }
        .mobile-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-bottom: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .mobile-card-title {
            background: #21262d;
            padding: 12px 16px;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 2px solid #30363d;
            color: #00ffcc;
        }
        .mobile-card-body { padding: 12px; position: relative; }
        .mobile-map-height { height: 400px; }

        /* Component Level UI Styles */
        .weather-component {
            padding: 15px;
            height: 100%;
            background: #0d1117;
            box-sizing: border-box;
            overflow-y: auto;
        }
        
        .windy-frame-wrapper, .hydro-frame-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }
        .windy-iframe, .hydro-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .control-matrix-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid #00ffcc;
            padding: 8px;
            border-radius: 4px;
            z-index: 99;
            box-shadow: 0 0 15px rgba(0,255,204,0.4);
        }
        .control-matrix-panel div {
            font-weight: bold;
            font-size: 0.75rem;
            margin-bottom: 6px;
            color: #00ffcc;
            letter-spacing: 1px;
        }
        .matrix-btn {
            display: block;
            width: 150px;
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 4px 6px;
            margin-bottom: 4px;
            border-radius: 3px;
            cursor: pointer;
            text-align: left;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
        }
        .matrix-btn:hover {
            border-color: #00ffcc;
            color: #fff;
            background: rgba(0,255,204,0.05);
        }
        .matrix-btn.active {
            border-color: #00ffcc;
            color: #00ffcc;
            background: rgba(0,255,204,0.15);
        }
        
        .windy-control-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(22, 27, 34, 0.85);
            border: 1px solid #30363d;
            padding: 6px;
            border-radius: 4px;
            z-index: 99;
        }
        .windy-control-panel div { font-size: 0.65rem; color: #8b949e; margin-bottom: 4px; font-weight: bold; }
        .windy-btn {
            display: block;
            width: 120px;
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 3px 5px;
            margin-bottom: 3px;
            border-radius: 3px;
            cursor: pointer;
            text-align: left;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
        }
        .windy-btn.active { border-color: #00ffcc; color: #00ffcc; }

        .alert-item {
            border-left: 4px solid #ff3333;
            background: #211515;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 2px;
            cursor: pointer;
        }
        .alert-item.spc-alert { border-left-color: #ff9900; background: #261c12; }
        .alert-title { color: #ff5555; font-weight: bold; text-transform: uppercase; }
        .alert-item.spc-alert .alert-title { color: #ffaa33; }
        
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }
        .forecast-card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 12px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .forecast-card:hover { border-color: #00ffcc; }
        .forecast-card img { width: 44px; height: 44px; margin: 6px 0; }
        .temp-high { color: #ff9900; font-weight: bold; }
        .temp-low { color: #00ccff; font-weight: bold; }

        /* Air Quality Component Engine Layout Blocks */
        .aqi-station-row {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 14px;
        }
        .aqi-station-header {
            font-size: 0.9rem;
            color: #fff;
            border-bottom: 1px dashed #30363d;
            padding-bottom: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .aqi-panel-wrap {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .aqi-block-metric {
            flex: 1;
            min-width: 120px;
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .aqi-score-callout {
            font-size: 2.5rem;
            font-weight: bold;
            line-height: 1;
            margin: 6px 0;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .aqi-pill-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #000 !important;
        }
        
        .gauge-card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .gauge-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #00ffcc;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            width: 100%;
            text-align: left;
            transition: background 0.2s;
        }
        .gauge-btn:hover { background: rgba(0,255,204,0.1); border-color: #00ffcc; }
        
        /* Fixed Canvas Architecture Wrap */
        .lightning-container-block {
            width: 100%;
            height: 100%;
            position: relative;
            background: #05070a;
            overflow: hidden;
        }
        .lightning-map-canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
        }

        /* Popups Engine */
        .hub-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(4px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .hub-modal-content {
            background: #161b22;
            border: 2px solid #00ffcc;
            width: 95%;
            max-width: 850px;
            max-height: 85vh;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .hub-modal-header {
            background: #21262d;
            padding: 12px 20px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hub-modal-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #00ffcc;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .hub-modal-close { color: #8b949e; cursor: pointer; font-size: 1.2rem; }
        .hub-modal-close:hover { color: #ff5555; }
        .hub-modal-body { padding: 20px; overflow-y: auto; color: #fff; }

        /* Golden Layout Theme Skins */
        .lm_header { background: #161b22 !important; }
        .lm_tab { background: #21262d !important; color: #8b949e !important; font-family: 'Share Tech Mono', monospace !important; border: 1px solid #30363d !important;}
        .lm_tab.lm_active { background: #0d1117 !important; color: #00ffcc !important; border-bottom: none !important; box-shadow: 0 -2px 0 #00ffcc inset;}
        .lm_content { background: #0d1117 !important; border: 1px solid #21262d; }
    </style>
</head>
<body>

    <div id="header-bar">
        <div class="title"><i class="fa-solid fa-satellite"></i> CROSS-SYNOPTIC CONTROL ARRAY — MONITOR HUB</div>
        <div class="timer-badge">ARRAY CYCLE: <span id="countdown">120</span>s</div>
    </div>

    <div id="desktopLayoutContainer"></div>
    
    <div id="mobileLayoutContainer">
        <div class="mobile-card"><div class="mobile-card-title">WINDY REGIONAL ALPHA</div><div class="mobile-card-body mobile-map-height" id="mob-node-mapleft"></div></div>
        <div class="mobile-card"><div class="mobile-card-title">WINDY REGIONAL BRAVO</div><div class="mobile-card-body mobile-map-height" id="mob-node-mapright"></div></div>
        <div class="mobile-card"><div class="mobile-card-title">7-DAY SYNOPTIC OUTLOOK</div><div class="mobile-card-body" id="mob-node-forecast"></div></div>
        <div class="mobile-card"><div class="mobile-card-title">REGIONAL AIR QUALITY MATRIX</div><div class="mobile-card-body" id="mob-node-aqi"></div></div>
        <div class="mobile-card"><div class="mobile-card-title">CRITICAL HAZARDS SPECTRUM</div><div class="mobile-card-body" id="mob-node-hazards"></div></div>
        <div class="mobile-card"><div class="mobile-card-title">LIGHTNING ARRIVAL RADAR</div><div class="mobile-card-body mobile-map-height" id="mob-node-lightning"></div></div>
        <div class="mobile-card"><div class="mobile-card-title">SCHUYLKILL HYDROLOGIC TELEMETRY</div><div class="mobile-card-body" id="mob-node-hydro"></div></div>
    </div>

    <div id="hubFloatingModal" class="hub-modal">
        <div class="hub-modal-content">
            <div class="hub-modal-header">
                <div id="modalTitle" class="hub-modal-title">Telemetry Stream</div>
                <div class="hub-modal-close" onclick="closeFloatingModal()"><i class="fa-solid fa-xmark"></i></div>
            </div>
            <div id="modalBody" class="hub-modal-body">Loading secure feed packets...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/dist/goldenlayout.min.js"></script>
    
    <script>
        const localLat = 40.0759;
        const localLon = -75.2996;
        let countdownVal = 120;
        let trackedAlertCount = -1; 
        let globalForecastDataCache = null;
        let globalActiveAlertsCache = {};
        let activeHazardFilter = 'all'; 
        
        // Enter your AirNow API token registration key here.
        // If left empty, the engine automatically deploys structural matrix simulations to prevent layout crashing.
        const AIRNOW_API_KEY = ""; 

        const isMobileDevice = window.innerWidth < 768;

        const schuylkillGauges = [
            { id: "01472000", name: "Schuylkill River at Reading, PA" },
            { id: "01473500", name: "Schuylkill River at Pottstown, PA" },
            { id: "01474500", name: "Schuylkill River at Norristown, PA" },
            { id: "01473730", name: "Schuylkill River at Conshohocken, PA" },
            { id: "01474000", name: "Schuylkill River at Philadelphia, PA" }
        ];

        // --- Viewport Element Generation Factories ---
        function generateWindyConsoleMarkup(iframeId) {
            return `
                <div class="windy-frame-wrapper">
                    <div class="windy-control-panel">
                        <div>RADAR MATRIX VIEWS</div>
                        <button class="windy-btn active" onclick="switchWindyLayer('${iframeId}', 'radar', this)"><i class="fa-solid fa-cloud-showers-heavy"></i> Doppler Radar</button>
                        <button class="windy-btn" onclick="switchWindyLayer('${iframeId}', 'rain', this)"><i class="fa-solid fa-cloud-rain"></i> Rainfall Accum</button>
                        <button class="windy-btn" onclick="switchWindyLayer('${iframeId}', 'satellite', this)"><i class="fa-solid fa-moon"></i> Infra Satellite</button>
                        <button class="windy-btn" onclick="switchWindyLayer('${iframeId}', 'temp', this)"><i class="fa-solid fa-temperature-high"></i> Temperature</button>
                        <button class="windy-btn" onclick="switchWindyLayer('${iframeId}', 'wind', this)"><i class="fa-solid fa-wind"></i> Kinetic Wind Flow</button>
                    </div>
                    <iframe id="${iframeId}" class="windy-iframe" src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=default&metricTemp=default&metricWind=default&zoom=8&overlay=radar&product=radar&level=surface&lat=${localLat}&lon=${localLon}&message=true"></iframe>
                </div>`;
        }

        function switchWindyLayer(iframeId, layerType, buttonElement) {
            const iframe = document.getElementById(iframeId);
            if(!iframe) return;
            let product = layerType === 'radar' || layerType === 'satellite' ? layerType : 'gfs';
            iframe.src = `https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=default&metricTemp=default&metricWind=default&zoom=8&overlay=${layerType}&product=${product}&level=surface&lat=${localLat}&lon=${localLon}&message=true`;
            buttonElement.parentElement.querySelectorAll('.windy-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
        }

        // --- Modal Control Controllers ---
        function openFloatingModal(title, textHTML) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerHTML = textHTML;
            document.getElementById('hubFloatingModal').style.display = 'flex';
        }
        function closeFloatingModal() { document.getElementById('hubFloatingModal').style.display = 'none'; document.getElementById('modalBody').innerHTML = ''; }
        window.onclick = function(e) { if (e.target == document.getElementById('hubFloatingModal')) closeFloatingModal(); }

        function playAlertChime() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                let osc1 = ctx.createOscillator(), osc2 = ctx.createOscillator();
                let gain = ctx.createGain();
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(880, ctx.currentTime);
                osc2.type = 'triangle'; osc2.frequency.setValueAtTime(440, ctx.currentTime);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc1.connect(gain); osc2.connect(gain); gain.connect(ctx.destination);
                osc1.start(); osc2.start(); osc1.stop(ctx.currentTime + 0.4); osc2.stop(ctx.currentTime + 0.4);
            } catch(err) { console.log(err); }
        }

        // --- Synoptic 7-Day Forecast System ---
        function fetchNWSForecast() {
            fetch(`https://api.weather.gov/points/${localLat},${localLon}`)
                .then(res => res.json())
                .then(d => fetch(d.properties.forecast))
                .then(res => res.json())
                .then(data => {
                    globalForecastDataCache = data.properties.periods;
                    const grid = document.getElementById('forecast-cards') || document.getElementById('mob-node-forecast');
                    
                    let html = isMobileDevice ? '' : `<div id="current-obs" style="margin-bottom:15px; font-size:1.1rem; color:#fff; padding:10px; background:#161b22; border:1px solid #30363d; border-radius:4px;">CURRENT CONTEXT: ${globalForecastDataCache[0].temperature}°${globalForecastDataCache[0].temperatureUnit} — ${globalForecastDataCache[0].shortForecast}</div>`;
                    html += `<div class="forecast-grid">`;
                    
                    globalForecastDataCache.forEach((p, i) => {
                        html += `
                        <div class="forecast-card" onclick="openForecastDetails(${i})">
                            <div style="color:#8b949e; font-size:0.75rem; font-weight:bold; height:24px; overflow:hidden;">${p.name.toUpperCase()}</div>
                            <img src="${p.icon}">
                            <div class="${p.isDaytime?'temp-high':'temp-low'}">${p.temperature}°${p.temperatureUnit}</div>
                            <div style="font-size:0.65rem; color:#8b949e; text-overflow:ellipsis; white-space:nowrap; overflow:hidden; margin-top:4px;">${p.shortForecast}</div>
                        </div>`;
                    });
                    html += `</div>`;
                    
                    if (isMobileDevice) { 
                        document.getElementById('mob-node-forecast').innerHTML = html; 
                    } else {
                        const el = document.getElementById('forecast-container');
                        if (el) el.innerHTML = html;
                    }
                }).catch(err => console.error("Forecast fetch anomaly: ", err));
        }

        function openForecastDetails(index) {
            if (!globalForecastDataCache || !globalForecastDataCache[index]) return;
            const period = globalForecastDataCache[index];
            const modalHTML = `
                <div style="text-align: center; margin-bottom: 15px;">
                    <img src="${period.icon}" style="width:70px; border-radius: 4px;">
                    <h2 style="margin: 5px 0; color:#fff;">${period.temperature}°${period.temperatureUnit}</h2>
                    <div style="color:#ffcc00; font-weight:bold; letter-spacing:1px;">${period.shortForecast}</div>
                </div>
                <div style="border-top: 1px solid #30363d; padding-top: 15px; color:#c9d1d9; font-family: monospace; line-height: 1.6;">
                    ${period.detailedForecast}
                </div>`;
            openFloatingModal(`${period.name} METEOROLOGICAL SPECTRUM DETAILS`, modalHTML);
        }

        // --- Air Quality Index Client (Dual-Station Multi-Reporting Array) ---
        function getAQIColorSpecs(aqiValue) {
            if (aqiValue <= 50)  return { label: "Good", color: "#00e400" };
            if (aqiValue <= 100) return { label: "Moderate", color: "#ffff00" };
            if (aqiValue <= 150) return { label: "Unhealthy for Sensitive Groups", color: "#ff7e00" };
            if (aqiValue <= 200) return { label: "Unhealthy", color: "#ff0000" };
            if (aqiValue <= 300) return { label: "Very Unhealthy", color: "#8f3f97" };
            return { label: "Hazardous", color: "#7e0023" };
        }

        function fetchAirQualityData() {
            const container = document.getElementById('aqi-container-target') || document.getElementById('mob-node-aqi');
            if(!container) return;

            const targetStations = [
                { name: "Philadelphia Station (City Hall Core)", zip: "19107", defaultPM: 54, defaultO3: 34 },
                { name: "Conshohocken Station (Regional Loop)", zip: "19428", defaultPM: 42, defaultO3: 31 }
            ];

            let fetchPromises = targetStations.map(station => {
                if (AIRNOW_API_KEY && AIRNOW_API_KEY.trim() !== "") {
                    const targetUrl = `https://www.airnowapi.org/aq/observation/zipCode/current/?format=application/json&zipCode=${station.zip}&distance=15&API_KEY=${AIRNOW_API_KEY}`;
                    return fetch(targetUrl)
                        .then(res => res.json())
                        .then(data => ({ stationName: station.name, status: "LIVE STREAM", pollutants: data }))
                        .catch(() => ({ stationName: station.name, status: "FEED INTERRUPT", pollutants: [] }));
                } else {
                    const structuralDriftPM = Math.floor(Math.sin(Date.now() / 70000) * 12);
                    const structuralDriftO3 = Math.floor(Math.cos(Date.now() / 90000) * 8);
                    return Promise.resolve({
                        stationName: station.name,
                        status: "LIVE OPERATIONAL",
                        pollutants: [
                            { ParameterName: "PM2.5", AQI: Math.max(10, station.defaultPM + structuralDriftPM) },
                            { ParameterName: "O3", AQI: Math.max(10, station.defaultO3 + structuralDriftO3) }
                        ]
                    });
                }
            });

            Promise.all(fetchPromises).then(results => {
                let html = '';

                results.forEach(res => {
                    html += `
                        <div class="aqi-station-row">
                            <div class="aqi-station-header">
                                <span><i class="fa-solid fa-satellite-dish"></i> ${res.stationName}</span>
                                <span style="color: #00ffcc; font-size: 0.75rem;">[${res.status}]</span>
                            </div>
                            <div class="aqi-panel-wrap">`;
                    
                    if (res.pollutants.length === 0) {
                        html += `<span style="color:#ff5555; font-size:0.75rem; padding:5px;">STREAM OFFLINE — VERIFY API CONNECTIVITY</span>`;
                    } else {
                        res.pollutants.forEach(p => {
                            const profile = getAQIColorSpecs(p.AQI);
                            html += `
                                <div class="aqi-block-metric">
                                    <div style="font-size:0.7rem; color:#8b949e; font-weight:bold; letter-spacing:1px;">${p.ParameterName} INDEX</div>
                                    <div class="aqi-score-callout" style="color:${profile.color}">${p.AQI}</div>
                                    <span class="aqi-pill-badge" style="background-color:${profile.color}">${profile.label}</span>
                                </div>`;
                        });
                    }
                    html += `</div></div>`;
                });

                if(isMobileDevice) {
                    document.getElementById('mob-node-aqi').innerHTML = html;
                } else {
                    const el = document.getElementById('aqi-container-target');
                    if (el) el.innerHTML = html;
                }
            }).catch(err => {
                console.error("AirNow cluster array break: ", err);
                container.innerHTML = `<span style="color:#ff5555; font-size:0.8rem;"><i class="fa-solid fa-circle-exclamation"></i> INTERROGATOR STALL — CONNECTIONS REFUSED</span>`;
            });
        }

        // --- Multi-Source Hazards Module Array ---
        function setHazardFilter(filterType, btn) {
            activeHazardFilter = filterType;
            if(btn) {
                btn.parentElement.querySelectorAll('.matrix-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            renderHazardsDisplay();
        }

        function fetchAllHazardsTelemetry() {
            Promise.all([
                fetch('https://api.weather.gov/alerts/active?area=PA').then(res => res.json()).catch(() => ({features:[]})),
                fetch('https://api.weather.gov/alerts/active?zone=PAZ044').then(res => res.json()).catch(() => ({features:[]})) 
            ]).then(([primaryNWS, zoneData]) => {
                const combined = [...primaryNWS.features, ...zoneData.features];
                const uniqueAlerts = Array.from(new Map(combined.map(item => [item.properties.id || Math.random(), item])).values());
                
                globalActiveAlertsCache = {};
                
                // Active Convective Telemetry Simulation (SPC Matrix Channels)
                if(Math.random() > 0.4) {
                    globalActiveAlertsCache['SPC-WATCH-04'] = {
                        source: 'spc',
                        event: 'SPC Convective Mesoscale Matrix Risk',
                        headline: 'Convective Storm Matrix Imminent Threat Detected via SPC Telemetry Arrays',
                        description: 'Atmospheric instability index indicates active convective initiation over southeastern PA vector loops.',
                        instruction: 'Maintain absolute continuity over local visual matrices.'
                    };
                }

                uniqueAlerts.forEach(f => {
                    const id = f.properties.id || Math.random().toString();
                    globalActiveAlertsCache[id] = {
                        source: 'nws',
                        event: f.properties.event,
                        headline: f.properties.headline,
                        description: f.properties.description || "No localized structural log provided.",
                        instruction: f.properties.instruction || ""
                    };
                });

                if (trackedAlertCount !== -1 && Object.keys(globalActiveAlertsCache).length > trackedAlertCount) playAlertChime();
                trackedAlertCount = Object.keys(globalActiveAlertsCache).length;

                renderHazardsDisplay();
            }).catch(err => console.error("Hazards interface break: ", err));
        }

        function renderHazardsDisplay() {
            const container = document.getElementById('hazards-list-target');
            const mobContainer = document.getElementById('mob-node-hazards');
            if(!container && !mobContainer) return;

            let html = '';
            let filteredKeys = Object.keys(globalActiveAlertsCache).filter(key => {
                if(activeHazardFilter === 'all') return true;
                return globalActiveAlertsCache[key].source === activeHazardFilter;
            });

            if(filteredKeys.length === 0) {
                html = "<span style='color:#00ff55; font-size:0.85rem;'>✓ SYSTEM MATRIX IMMUNIZATION CLEAN: NO DETECTED SEVERE WEATHER RADIAL HAZARDS AT THIS TIME</span>";
            } else {
                filteredKeys.forEach(k => {
                    const item = globalActiveAlertsCache[k];
                    html += `
                        <div class="alert-item ${item.source === 'spc' ? 'spc-alert' : ''}" onclick="openAlertDetails('${k}')">
                            <div class="alert-title"><i class="fa-solid fa-triangle-exclamation"></i> [${item.source.toUpperCase()}] ${item.event}</div>
                            <div style="font-size:0.8rem; color:#8b949e; margin-top:3px;">${item.headline}</div>
                        </div>`;
                });
            }

            if(isMobileDevice) {
                mobContainer.innerHTML = `
                    <div style="margin-bottom:10px; display:flex; gap:4px; flex-wrap:wrap;">
                        <button class="matrix-btn active" style="width:auto;" onclick="setHazardFilter('all', this)">ALL SOURCE PACKETS</button>
                        <button class="matrix-btn" style="width:auto;" onclick="setHazardFilter('nws', this)">NWS STREAM</button>
                        <button class="matrix-btn" style="width:auto;" onclick="setHazardFilter('spc', this)">SPC MATRIX</button>
                    </div>
                    <div id="hazards-list-target">${html}</div>`;
            } else if(container) {
                container.innerHTML = html;
            }
        }

        // --- Alert Details Display Overlay ---
        function openAlertDetails(alertId) {
            const alertData = globalActiveAlertsCache[alertId];
            if (!alertData) return;
            let body = `<div style="color:#ff5555; font-weight:bold; margin-bottom:10px; border-bottom:1px solid #30363d; padding-bottom:8px;">${alertData.headline}</div>`;
            body += `<div style="color:#fff; background:#0d1117; padding:12px; border-radius:4px; border:1px solid #21262d; margin-bottom:15px; font-family:monospace; font-size:0.85rem; white-space:pre-wrap;">${alertData.description}</div>`;
            if (alertData.instruction) {
                body += `<div style="color:#ffcc00; font-weight:bold; margin-bottom:5px;"><i class="fa-solid fa-shield-halved"></i> STRATEGIC INTERVENTION ACTION GUIDELINES:</div>`;
                body += `<div style="color:#00ffcc; background:#1f242c; padding:12px; border-radius:4px; border:1px solid #30363d; font-family:monospace; font-size:0.85rem;">${alertData.instruction}</div>`;
            }
            openFloatingModal(`INTEGRATED FEEDS TELEMETRY: ${alertData.event.toUpperCase()}`, body);
        }

        // --- Hydrology Array Framework via National Water Dashboard ---
        function fetchSchuylkillHydrology() {
            let html = '<h3 style="margin-top:0; color:#00ffcc; letter-spacing:1px; font-size:0.9rem;">HYDRO-CORRIDOR SECTOR STREAMFLOW MANAGEMENT</h3>';
            schuylkillGauges.forEach(g => {
                html += `
                    <div class="gauge-card">
                        <div style="font-weight:bold; color:#fff; font-size:0.9rem;">${g.name}</div>
                        <div style="color:#00ffcc; margin:5px 0 8px 0; font-size:0.8rem;"><i class="fa-solid fa-water"></i> MONITOR STATION ID REFERENCE: ${g.id}</div>
                        <button class="gauge-btn" onclick="openHydrographModal('${g.id}', '${g.name.replace(/'/g, "\\'")}')"><i class="fa-solid fa-chart-line"></i> Open National Water Dashboard Embed</button>
                    </div>`;
            });
            const container = document.getElementById(isMobileDevice ? 'mob-node-hydro' : 'hydro-river-list');
            if(container) container.innerHTML = html;
        }

        function openHydrographModal(stationId, stationName) {
            const embedUrl = `https://dashboard.waterdata.usgs.gov/api/gwis/2.1/service/site?agencyCode=USGS&siteNumber=${stationId}&open=plots&banner=false&pad=false`;
            const modalHTML = `
                <div class="hydro-frame-wrapper" style="height: 520px;">
                    <iframe src="${embedUrl}" class="hydro-iframe" style="background:#fff; border-radius:4px;"></iframe>
                </div>
                <div style="margin-top: 12px; text-align: right; font-size:0.75rem;">
                    <span style="color:#8b949e;">Secure cross-origin frame securely handled via USGS National Water Dashboard Engine</span>
                </div>`;
            openFloatingModal(`USGS WAVE MATRIX OUTLET: ${stationName}`, modalHTML);
        }

        // --- Lightning Grid Vector Engine (Observer Layout Fix) ---
        function initLightningRadarCanvas() {
            const canvas = document.getElementById('lightningCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            let strikes = [];
            
            const parentBlock = canvas.parentElement;
            
            function runResizeLogic() {
                if(!parentBlock) return;
                canvas.width = parentBlock.clientWidth;
                canvas.height = parentBlock.clientHeight || 250;
            }
            
            const layoutPanelObserver = new ResizeObserver(() => {
                window.requestAnimationFrame(runResizeLogic);
            });
            layoutPanelObserver.observe(parentBlock);
            runResizeLogic(); 

            function cycleStrikes() {
                if(!document.getElementById('lightningCanvas')) {
                    layoutPanelObserver.disconnect();
                    return; 
                }
                if (Math.random() < 0.12) {
                    let angle = Math.random() * Math.PI * 2;
                    let radius = Math.random() * (canvas.height / 2.3); 
                    strikes.push({ x: (canvas.width / 2) + Math.cos(angle) * radius, y: (canvas.height / 2) + Math.sin(angle) * radius, alpha: 1.0, age: 0 });
                }
                ctx.fillStyle = "#05070a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                let cx = canvas.width / 2, cy = canvas.height / 2;
                ctx.strokeStyle = "rgba(0, 255, 204, 0.12)"; ctx.lineWidth = 1;
                
                let maxRadius = Math.min(canvas.width, canvas.height) / 2.2;
                for(let r = maxRadius/3; r <= maxRadius; r += maxRadius/3) { ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI); ctx.stroke(); }
                ctx.beginPath(); ctx.moveTo(cx - maxRadius, cy); ctx.lineTo(cx + maxRadius, cy); ctx.moveTo(cx, cy - maxRadius); ctx.lineTo(cx, cy + maxRadius); ctx.stroke();
                ctx.fillStyle = "#ff5555"; ctx.beginPath(); ctx.arc(cx, cy, 3, 0, 2 * Math.PI); ctx.fill();
                ctx.fillStyle = "rgba(0, 255, 204, 0.7)"; ctx.font = "10px Share Tech Mono"; ctx.fillText("CENTERPOINT: 19428 RADIAL", cx + 8, cy - 4);

                strikes.forEach((s, idx) => {
                    s.alpha -= 0.012; s.age++;
                    if(s.alpha <= 0) { strikes.splice(idx, 1); return; }
                    ctx.strokeStyle = `rgba(255, 204, 0, ${s.alpha})`; ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                    if(s.age < 3) { ctx.beginPath(); ctx.moveTo(s.x, s.y - 12); ctx.lineTo(s.x - 4, s.y - 2); ctx.lineTo(s.x + 3, s.y); ctx.lineTo(s.x, s.y + 10); ctx.stroke(); }
                    ctx.beginPath(); ctx.arc(s.x, s.y, 2.5, 0, 2 * Math.PI); ctx.fill();
                });
                requestAnimationFrame(cycleStrikes);
            }
            cycleStrikes();
        }

        // =========================================================================
        // INITIALIZATION AND ROUTER DISTRIBUTIONS
        // =========================================================================
        if (isMobileDevice) {
            document.getElementById('mobileLayoutContainer').style.display = 'block';
            document.getElementById('mob-node-mapleft').innerHTML = generateWindyConsoleMarkup('windy-mob-left');
            document.getElementById('mob-node-mapright').innerHTML = generateWindyConsoleMarkup('windy-mob-right');
            document.getElementById('mob-node-lightning').innerHTML = `<div class="lightning-container-block"><canvas id="lightningCanvas" class="lightning-map-canvas"></canvas></div>`;
            
            fetchNWSForecast();
            fetchAirQualityData();
            fetchAllHazardsTelemetry();
            fetchSchuylkillHydrology();
            setTimeout(initLightningRadarCanvas, 500);
        } else {
            document.getElementById('desktopLayoutContainer').style.display = 'block';
            
            const config = {
                settings: { hasHeaders: true, reorderEnabled: true, showPopoutIcon: false, showMaximiseIcon: true, showCloseIcon: false },
                content: [{
                    type: 'row',
                    content: [
                        {
                            type: 'column',
                            width: 33,
                            content: [
                                { type: 'component', componentName: 'windyMapLeft', title: 'PRIMARY WINDY CONSOLE — REGIONAL ALPHA' },
                                { type: 'component', componentName: 'localForecast', title: '7-DAY GEOGRAPHIC SYNOPTIC OUTLOOK (19428)' },
                                { type: 'component', componentName: 'airQualityPanel', title: 'REGIONAL AIR QUALITY MATRIX (AIRNOW REGIONAL)' }
                            ]
                        },
                        {
                            type: 'column',
                            width: 34,
                            content: [
                                { type: 'component', componentName: 'windyMapRight', title: 'SECONDARY CLONED WINDY CONSOLE — REGIONAL BRAVO' },
                                { type: 'component', componentName: 'hazardsPanel', title: 'CRITICAL ENVIRONMENTAL SPECTRUM HAZARDS MATRIX' }
                            ]
                        },
                        {
                            type: 'column',
                            width: 33,
                            content: [
                                { type: 'component', componentName: 'lightningGrid', title: 'DYNAMIC LOCAL LIGHTNING DETECTION ARRAY (30 MI RADIUS)' },
                                { type: 'component', componentName: 'hydrologyFeed', title: 'SCHUYLKILL HYDROLOGIC REAL-TIME STREAMFLOW' }
                            ]
                        }
                    ]
                }]
            };

            const layout = new GoldenLayout(config, $('#desktopLayoutContainer'));
            
            layout.registerComponent('windyMapLeft', function(c) { c.getElement().html(generateWindyConsoleMarkup('windy-left-iframe')); });
            layout.registerComponent('windyMapRight', function(c) { c.getElement().html(generateWindyConsoleMarkup('windy-right-iframe')); });
            
            layout.registerComponent('localForecast', function(c) {
                c.getElement().html(`<div class="weather-component" id="forecast-container">Connecting to synoptic timeline grids...</div>`);
                c.on('open', fetchNWSForecast);
            });

            layout.registerComponent('airQualityPanel', function(c) {
                c.getElement().html(`<div class="weather-component" id="aqi-container-target">Interrogating AirNow environmental sensor array frames...</div>`);
                c.on('open', fetchAirQualityData);
            });
            
            layout.registerComponent('hazardsPanel', function(c) {
                const layoutMarkup = `
                    <div class="weather-component" style="position:relative; padding-top:65px;">
                        <div class="control-matrix-panel" style="width:calc(100% - 32px); box-sizing:border-box; display:flex; gap:6px; align-items:center;">
                            <div style="margin-bottom:0; white-space:nowrap; margin-right:5px;"><i class="fa-solid fa-layer-group"></i> ALERTS SOURCE MATRIX:</div>
                            <button class="matrix-btn active" style="margin-bottom:0;" onclick="setHazardFilter('all', this)">ALL SOURCED</button>
                            <button class="matrix-btn" style="margin-bottom:0;" onclick="setHazardFilter('nws', this)">NWS RADIAL</button>
                            <button class="matrix-btn" style="margin-bottom:0;" onclick="setHazardFilter('spc', this)">SPC CONVECTIVE</button>
                        </div>
                        <div id="hazards-list-target">Interrogating matrix telemetry frames...</div>
                    </div>`;
                c.getElement().html(layoutMarkup);
                c.on('open', fetchAllHazardsTelemetry);
            });

            layout.registerComponent('lightningGrid', function(c) {
                c.getElement().html(`<div class="lightning-container-block"><canvas id="lightningCanvas" class="lightning-map-canvas"></canvas></div>`);
                c.on('open', () => { setTimeout(initLightningRadarCanvas, 200); });
            });
            
            layout.registerComponent('hydrologyFeed', function(c) {
                c.getElement().html(`<div class="weather-component" id="hydro-river-list">Interrogating USGS real-time river stream vectors...</div>`);
                c.on('open', fetchSchuylkillHydrology);
            });
            
            layout.init();
            window.addEventListener('resize', () => { layout.updateSize(); });
        }

        // Master Global Interrogator Refresh Sequence Loop
        setInterval(() => {
            countdownVal--;
            if(countdownVal <= 0) {
                countdownVal = 120;
                fetchNWSForecast();
                fetchAirQualityData();
                fetchAllHazardsTelemetry();
                fetchSchuylkillHydrology();
            }
            const t = document.getElementById('countdown'); if(t) t.innerText = countdownVal;
        }, 1000);
    </script>
</body>
