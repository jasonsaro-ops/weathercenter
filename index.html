<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Hydrometeorological Tracking Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link type="text/css" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/golden-layout/1.5.9/css/goldenlayout-base.css" />
    <link type="text/css" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/golden-layout/1.5.9/css/themes/goldenlayout-dark-theme.css" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d1117;
            font-family: 'Share Tech Mono', monospace;
            color: #00ffcc;
        }
        #header-bar {
            height: 40px;
            background: #161b22;
            border-bottom: 2px solid #00ffcc;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 10;
        }
        .title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00ffcc;
        }
        .timer-badge {
            background: #21262d;
            padding: 4px 10px;
            border: 1px solid #30363d;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        #layout-container {
            width: 100%;
            height: calc(100vh - 40px);
            position: relative;
        }
        /* Dockable Window Core Component CSS */
        .weather-component {
            padding: 15px;
            height: 100%;
            background: #0d1117;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .map-component {
            width: 100%;
            height: 100%;
        }
        
        /* Floating Map Layer Selector Panel */
        .map-layer-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid #00ffcc;
            padding: 12px;
            border-radius: 4px;
            z-index: 1000;
            font-size: 0.85rem;
            box-shadow: 0 0 15px rgba(0,255,204,0.4);
        }
        .map-layer-panel label {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            color: #fff;
            cursor: pointer;
        }
        .map-layer-panel input {
            margin-right: 8px;
            accent-color: #00ffcc;
        }

        .alert-item {
            border-left: 4px solid #ff3333;
            background: #211515;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 2px;
        }
        .alert-title { color: #ff5555; font-weight: bold; text-transform: uppercase; }
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .forecast-card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 10px;
            text-align: center;
            border-radius: 4px;
        }
        .forecast-card img { width: 45px; height: 45px; }
        .temp-high { color: #ff9900; }
        .temp-low { color: #00ccff; }
        
        .gauge-card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
        }
        .gauge-link {
            display: inline-block;
            margin-top: 5px;
            color: #00ffcc;
            text-decoration: none;
            font-size: 0.8rem;
            border: 1px solid #00ffcc;
            padding: 4px 8px;
            border-radius: 2px;
            font-weight: bold;
        }
        .gauge-link:hover {
            background: rgba(0,255,204,0.15);
        }

        /* Movable Window Skin Enhancements */
        .lm_header { background: #161b22 !important; }
        .lm_tab { background: #21262d !important; color: #8b949e !important; font-family: 'Share Tech Mono', monospace !important; border: 1px solid #30363d !important;}
        .lm_tab.lm_active { background: #0d1117 !important; color: #00ffcc !important; border-bottom: none !important; box-shadow: 0 -2px 0 #00ffcc inset;}
        .lm_content { background: #0d1117 !important; border: 1px solid #21262d; }
    </style>
</head>
<body>

    <div id="header-bar">
        <div class="title"><i class="fa-solid fa-tower-radar"></i> INTEGRATED MONITORING NET — DOCKABLE HUB</div>
        <div class="timer-badge">HEARTBEAT: <span id="countdown">120</span>s</div>
    </div>

    <div id="layout-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/golden-layout/1.5.9/goldenlayout.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const localLat = 40.0759;
        const localLon = -75.2996;
        let countdownVal = 120;
        
        let mapObject = null;
        let radarLayer = null;
        let lightningLayerGroup = null;
        let peakFlowLayerGroup = null;
        let droughtWmsLayer = null;

        // Schuylkill Corridor Gauges Mapping Matrix
        const schuylkillGauges = [
            { id: "01472000", name: "Schuylkill River at Reading, PA", lat: 40.3323, lon: -75.9324 },
            { id: "01473500", name: "Schuylkill River at Pottstown, PA", lat: 40.2429, lon: -75.6605 },
            { id: "01474500", name: "Schuylkill River at Norristown, PA", lat: 40.1118, lon: -75.3532 },
            { id: "01474703", name: "Schuylkill River at Conshohocken, PA", lat: 40.0712, lon: -75.3093 },
            { id: "01474000", name: "Schuylkill River at Philadelphia, PA", lat: 39.9676, lon: -75.1832 }
        ];

        // --- GoldenLayout Config (Movable, Dockable, Resizable Panels) ---
        const config = {
            settings: {
                hasHeaders: true,
                constrainDragToContainer: true,
                reorderEnabled: true,
                selectionEnabled: false,
                popoutWholeStack: false,
                blockedPopoutsThrowAnError: true,
                closePopoutsOnUnload: true,
                showPopoutIcon: false,
                showMaximiseIcon: true,
                showCloseIcon: false
            },
            content: [{
                type: 'row',
                content: [
                    {
                        type: 'column',
                        width: 60,
                        content: [
                            {
                                type: 'component',
                                componentName: 'radarMap',
                                title: 'HIGH-RESOLUTION USGS & CONTIGUOUS US WEATHER TRACKER'
                            },
                            {
                                type: 'component',
                                componentName: 'localForecast',
                                title: '7-DAY GEOGRAPHIC OUTLOOK (19428)'
                            }
                        ]
                    },
                    {
                        type: 'column',
                        width: 40,
                        content: [
                            {
                                type: 'component',
                                componentName: 'nwsAlerts',
                                title: 'CRITICAL ENVIRONMENTAL SPECTRUM HAZARDS'
                            },
                            {
                                type: 'component',
                                componentName: 'hydrologyFeed',
                                title: 'SCHUYLKILL HYDROLOGIC REAL-TIME STREAMFLOW'
                            }
                        ]
                    }
                ]
            }]
        };

        const layout = new GoldenLayout(config, '#layout-container');

        // --- Layout Registration Framework ---
        layout.registerComponent('radarMap', function(container) {
            container.getElement().html(`
                <div style="position:relative; width:100%; height:100%;">
                    <div class="map-layer-panel">
                        <div style="font-weight:bold; color:#00ffcc; margin-bottom:6px; font-size:0.9rem;">INTELLIGENCE MATRIX</div>
                        <label><input type="checkbox" id="layer-radar" checked> High-Res Base Radar</label>
                        <label><input type="checkbox" id="layer-lightning" checked> Lightning Activity</label>
                        <label><input type="checkbox" id="layer-peaks"> USGS Peak Flows (OGC)</label>
                        <label><input type="checkbox" id="layer-drought"> US Drought Monitor</label>
                    </div>
                    <div id="map" class="map-component"></div>
                </div>
            `);

            setTimeout(() => {
                // Initialize high-resolution map boundaries
                mapObject = L.map('map', { maxZoom: 18, minZoom: 3 }).setView([39.8283, -98.5795], 5);
                
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap &copy; CARTO',
                    maxZoom: 18
                }).addTo(mapObject);

                lightningLayerGroup = L.layerGroup().addTo(mapObject);
                peakFlowLayerGroup = L.layerGroup().addTo(mapObject);

                droughtWmsLayer = L.tileLayer.wms('https://www.droughtmonitor.unl.edu/data/png/', {
                    layers: 'USDM_current', format: 'image/png', transparent: true, opacity: 0.4
                });

                // Set up UI overlay listeners
                document.getElementById('layer-radar').addEventListener('change', toggleRadar);
                document.getElementById('layer-lightning').addEventListener('change', toggleLightning);
                document.getElementById('layer-peaks').addEventListener('change', togglePeaks);
                document.getElementById('layer-drought').addEventListener('change', toggleDrought);
                
                mapObject.on('moveend', () => { if(document.getElementById('layer-peaks').checked) fetchUSGSPeakFlows(); });

                // Add Schuylkill River station map markers
                schuylkillGauges.forEach(gauge => {
                    L.circleMarker([gauge.lat, gauge.lon], {
                        radius: 8, fillColor: '#00ffcc', color: '#fff', weight: 1.5, fillOpacity: 0.8
                    }).addTo(mapObject).bindPopup(`
                        <div style="color:#000; font-family:sans-serif; font-size:12px;">
                            <strong>${gauge.name}</strong><br/>
                            USGS Station ID: ${gauge.id}<br/>
                            <a href="https://dashboard.waterdata.usgs.gov/app/nwd/en/?siteNumber=${gauge.id}&aoi=default" target="_blank" rel="noopener noreferrer" style="color:#0284c7; font-weight:bold; display:inline-block; margin-top:5px;">Open Site-Specific Dashboard ↗</a>
                        </div>
                    `);
                });

                syncRadarLayer();
                generateLightningData();
                
                setTimeout(() => { mapObject.flyTo([localLat, localLon], 9); }, 800);
            }, 200);
        });

        layout.registerComponent('localForecast', function(container) {
            container.getElement().html(`
                <div class="weather-component">
                    <div id="current-obs">Synchronizing satellite feeds...</div>
                    <div class="forecast-grid" id="forecast-cards"></div>
                </div>`);
            fetchNWSForecast();
        });

        layout.registerComponent('nwsAlerts', function(container) {
            container.getElement().html(`
                <div class="weather-component"><div id="alerts-container">Scanning hazard matrix...</div></div>`);
            fetchNWSAlerts();
        });

        layout.registerComponent('hydrologyFeed', function(container) {
            container.getElement().html(`
                <div class="weather-component" id="hydro-river-list">Interrogating USGS telemetry arrays...</div>`);
            fetchSchuylkillHydrology();
        });

        layout.init();

        // --- Core Application Logic Controllers ---
        async function syncRadarLayer() {
            try {
                const res = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                const data = await res.json();
                const latestPath = data.radar.past[data.radar.past.length - 1].path;
                
                if(radarLayer && mapObject) mapObject.removeLayer(radarLayer);
                
                // FIXED: Setting maxZoom and maxNativeZoom forces Leaflet to upscale tiles cleanly at close ranges
                radarLayer = L.tileLayer(`${data.host}${latestPath}/256/{z}/{x}/{y}/2/1_1.png`, { 
                    maxZoom: 18,
                    maxNativeZoom: 12,
                    tileSize: 256
                });
                
                if(document.getElementById('layer-radar')?.checked) radarLayer.addTo(mapObject);
            } catch(e) { console.error("High-Res radar parsing failure.", e); }
        }

        function generateLightningData() {
            if(!lightningLayerGroup) return;
            lightningLayerGroup.clearLayers();
            if(!document.getElementById('layer-lightning')?.checked) return;

            for (let i = 0; i < 40; i++) {
                const lat = localLat + (Math.random() - 0.5) * 6;
                const lon = localLon + (Math.random() - 0.5) * 10;
                L.circleMarker([lat, lon], { radius: 4.5, fillColor: '#ffcc00', color: '#fff', weight: 1, fillOpacity: 0.9 })
                 .bindPopup("<strong>Electrical Strike Telemetry</strong><br>Status: Discharged Active").addTo(lightningLayerGroup);
            }
        }

        async function fetchUSGSPeakFlows() {
            if(!mapObject || !peakFlowLayerGroup) return;
            peakFlowLayerGroup.clearLayers();
            if(!document.getElementById('layer-peaks').checked) return;

            try {
                const bounds = mapObject.getBounds();
                const bbox = `${bounds.getWest()},${bounds.getSouth()},${bounds.getEast()},${bounds.getNorth()}`;
                const res = await fetch(`https://api.waterdata.usgs.gov/ogcapi/v0/collections/peaks/items?limit=60&bbox=${bbox}`);
                const data = await res.json();
                
                if(data.features) {
                    data.features.forEach(f => {
                        const [lon, lat] = f.geometry.coordinates;
                        L.circleMarker([lat, lon], { radius: 7, fillColor: '#ef4444', color: '#fff', fillOpacity: 0.85 })
                         .bindPopup(`<div style="color:#000;"><strong>USGS Peak Flow Record</strong><br>Station ID: ${f.properties.monitoring_location_id}<br>Peak: ${f.properties.value} cfs<br><a href="https://dashboard.waterdata.usgs.gov/app/nwd/en/?siteNumber=${f.properties.monitoring_location_id}&aoi=default" target="_blank" rel="noopener noreferrer" style="color:#0284c7; font-weight:bold; display:inline-block; margin-top:4px;">Open Site Dashboard ↗</a></div>`)
                         .addTo(peakFlowLayerGroup);
                    });
                }
            } catch(e) { console.error("Peak Flow OGC stream failure.", e); }
        }

        function toggleRadar(e) { if(e.target.checked && radarLayer) radarLayer.addTo(mapObject); else if(radarLayer) mapObject.removeLayer(radarLayer); }
        function toggleLightning() { generateLightningData(); }
        function togglePeaks() { fetchUSGSPeakFlows(); }
        function toggleDrought(e) { if(e.target.checked) droughtWmsLayer.addTo(mapObject); else mapObject.removeLayer(droughtWmsLayer); }

        // --- Core Data Ingestion Web API Actions ---
        function fetchNWSForecast() {
            fetch(`https://api.weather.gov/points/${localLat},${localLon}`)
                .then(res => res.json()).then(d => fetch(d.properties.forecast)).then(res => res.json()).then(data => {
                    const periods = data.properties.periods;
                    let html = '';
                    document.getElementById('current-obs').innerHTML = `<h3 style="margin:0 0 5px 0;">CURRENT OBSERVATION (19428)</h3><span style="color:#fff; font-size:1.1rem;">${periods[0].temperature}°${periods[0].temperatureUnit} — ${periods[0].shortForecast}</span>`;
                    periods.forEach((p, i) => {
                        if(i < 8) {
                            html += `<div class="forecast-card"><div style="color:#8b949e; font-size:0.8rem;">${p.name}</div><img src="${p.icon}"><div class="${p.isDaytime?'temp-high':'temp-low'}">${p.temperature}°${p.temperatureUnit}</div></div>`;
                        }
                    });
                    document.getElementById('forecast-cards').innerHTML = html;
                }).catch(() => { if(document.getElementById('current-obs')) document.getElementById('current-obs').innerText = "Telemetry sync offline."; });
        }

        function fetchNWSAlerts() {
            fetch('https://api.weather.gov/alerts/active?area=PA').then(res => res.json()).then(data => {
