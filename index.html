<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Weather & Hydrology Monitor — Windy Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/src/css/goldenlayout-base.css" />
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/src/css/goldenlayout-dark-theme.css" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d1117;
            font-family: 'Share Tech Mono', monospace;
            color: #00ffcc;
        }
        #header-bar {
            height: 40px;
            background: #161b22;
            border-bottom: 2px solid #00ffcc;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 100;
        }
        .title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00ffcc;
        }
        .timer-badge {
            background: #21262d;
            padding: 4px 10px;
            border: 1px solid #30363d;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        #layout-container {
            width: 100%;
            height: calc(100vh - 40px);
            position: relative;
        }
        
        /* Layout Grid System Overrides */
        .weather-component {
            padding: 15px;
            height: 100%;
            background: #0d1117;
            box-sizing: border-box;
            overflow-y: auto;
        }
        
        /* Windy Container Engine */
        .windy-frame-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }
        .windy-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Floating Layer Controller Panel */
        .windy-control-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid #00ffcc;
            padding: 10px;
            border-radius: 4px;
            z-index: 9999;
            box-shadow: 0 0 15px rgba(0,255,204,0.4);
        }
        .windy-control-panel div {
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 6px;
            color: #00ffcc;
            letter-spacing: 1px;
        }
        .windy-btn {
            display: block;
            width: 140px;
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 5px 8px;
            margin-bottom: 4px;
            border-radius: 3px;
            cursor: pointer;
            text-align: left;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }
        .windy-btn:hover {
            border-color: #00ffcc;
            color: #fff;
            background: rgba(0,255,204,0.05);
        }
        .windy-btn.active {
            border-color: #00ffcc;
            color: #00ffcc;
            background: rgba(0,255,204,0.15);
            box-shadow: 0 0 8px rgba(0,255,204,0.2);
        }

        /* Weather UI Elements */
        .alert-item {
            border-left: 4px solid #ff3333;
            background: #211515;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 2px;
        }
        .alert-title { color: #ff5555; font-weight: bold; text-transform: uppercase; }
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .forecast-card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 10px;
            text-align: center;
            border-radius: 4px;
        }
        .forecast-card img { width: 45px; height: 45px; }
        .temp-high { color: #ff9900; }
        .temp-low { color: #00ccff; }
        
        .gauge-card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .gauge-link {
            display: inline-block;
            margin-top: 6px;
            color: #00ffcc;
            text-decoration: none;
            font-size: 0.75rem;
            border: 1px solid #00ffcc;
            padding: 4px 8px;
            border-radius: 2px;
            font-weight: bold;
            transition: background 0.2s ease;
        }
        .gauge-link:hover {
            background: rgba(0,255,204,0.15);
        }

        /* Skin Tuning for Window Panels */
        .lm_header { background: #161b22 !important; }
        .lm_tab { background: #21262d !important; color: #8b949e !important; font-family: 'Share Tech Mono', monospace !important; border: 1px solid #30363d !important;}
        .lm_tab.lm_active { background: #0d1117 !important; color: #00ffcc !important; border-bottom: none !important; box-shadow: 0 -2px 0 #00ffcc inset;}
        .lm_content { background: #0d1117 !important; border: 1px solid #21262d; }
    </style>
</head>
<body>

    <div id="header-bar">
        <div class="title"><i class="fa-solid fa-satellite"></i> METEOROLOGICAL MONITORING NETWORK — REPAIRED HARDWARE CORRIDOR</div>
        <div class="timer-badge">ARRAY CYCLE: <span id="countdown">120</span>s</div>
    </div>

    <div id="layout-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/dist/goldenlayout.min.js"></script>
    
    <script>
        const localLat = 40.0759;
        const localLon = -75.2996;
        let countdownVal = 120;

        // Matrix definitions mapped explicitly to target parameters
        const schuylkillGauges = [
            { id: "01472000", name: "Schuylkill River at Reading, PA" },
            { id: "01473500", name: "Schuylkill River at Pottstown, PA" },
            { id: "01474500", name: "Schuylkill River at Norristown, PA" },
            { id: "01474703", name: "Schuylkill River at Conshohocken, PA" },
            { id: "01474000", name: "Schuylkill River at Philadelphia, PA" }
        ];

        // --- GoldenLayout Window Grid Setup (Fully Movable & Dockable) ---
        const config = {
            settings: {
                hasHeaders: true,
                constrainDragToContainer: true,
                reorderEnabled: true,
                selectionEnabled: false,
                showPopoutIcon: false,
                showMaximiseIcon: true,
                showCloseIcon: false
            },
            content: [{
                type: 'row',
                content: [
                    {
                        type: 'column',
                        width: 55,
                        content: [
                            {
                                type: 'component',
                                componentName: 'windyMap',
                                title: 'WINDY.COM ENVIRONMENTAL LAYER DEPLOYMENT CONSOLE'
                            },
                            {
                                type: 'component',
                                componentName: 'localForecast',
                                title: '7-DAY GEOGRAPHIC OUTLOOK (19428)'
                            }
                        ]
                    },
                    {
                        type: 'column',
                        width: 45,
                        content: [
                            {
                                type: 'component',
                                componentName: 'nwsAlerts',
                                title: 'CRITICAL ENVIRONMENTAL SPECTRUM HAZARDS'
                            },
                            {
                                type: 'component',
                                componentName: 'hydrologyFeed',
                                title: 'SCHUYLKILL HYDROLOGIC REAL-TIME STREAMFLOW'
                            }
                        ]
                    }
                ]
            }]
        };

        const layout = new GoldenLayout(config, '#layout-container');

        // --- Component Engine Registrations ---
        layout.registerComponent('windyMap', function(container) {
            container.getElement().html(`
                <div class="windy-frame-wrapper">
                    <div class="windy-control-panel">
                        <div>RADAR MATRIX VIEWS</div>
                        <button class="windy-btn active" onclick="switchWindyLayer('radar', this)"><i class="fa-solid fa-cloud-showers-heavy"></i> Doppler Radar</button>
                        <button class="windy-btn" onclick="switchWindyLayer('rain', this)"><i class="fa-solid fa-cloud-cloudhairs-rain"></i> Rainfall Accum</button>
                        <button class="windy-btn" onclick="switchWindyLayer('satellite', this)"><i class="fa-solid fa-moon"></i> Infra Satellite</button>
                        <button class="windy-btn" onclick="switchWindyLayer('temp', this)"><i class="fa-solid fa-temperature-high"></i> Temperature</button>
                        <button class="windy-btn" onclick="switchWindyLayer('wind', this)"><i class="fa-solid fa-wind"></i> Kinetic Wind Flow</button>
                    </div>
                    <iframe id="windy-iframe-element" class="windy-iframe" src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=default&metricTemp=default&metricWind=default&zoom=8&overlay=radar&product=radar&level=surface&lat=${localLat}&lon=${localLon}&message=true"></iframe>
                </div>
            `);
        });

        layout.registerComponent('localForecast', function(container) {
            container.getElement().html(`
                <div class="weather-component">
                    <div id="current-obs">Interrogating weather server metrics...</div>
                    <div class="forecast-grid" id="forecast-cards"></div>
                </div>`);
            
            // Execute fetching after structural compilation completes
            container.on('open', fetchNWSForecast);
        });

        layout.registerComponent('nwsAlerts', function(container) {
            container.getElement().html(`
                <div class="weather-component"><div id="alerts-container">Scanning diagnostic telemetry alert matrix...</div></div>`);
            container.on('open', fetchNWSAlerts);
        });

        layout.registerComponent('hydrologyFeed', function(container) {
            container.getElement().html(`
                <div class="weather-component" id="hydro-river-list">Awaiting connection to USGS water telemetry arrays...</div>`);
            container.on('open', fetchSchuylkillHydrology);
        });

        // Initialize window structures
        layout.init();

        // --- Windy View Layer Switch Logic ---
        function switchWindyLayer(layerType, buttonElement) {
            const iframe = document.getElementById('windy-iframe-element');
            if(!iframe) return;
            
            // Map the toggle selection down to optimized products
            let product = 'gfs';
            if(layerType === 'radar') product = 'radar';
            if(layerType === 'satellite') product = 'satellite';

            iframe.src = `https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=default&metricTemp=default&metricWind=default&zoom=8&overlay=${layerType}&product=${product}&level=surface&lat=${localLat}&lon=${localLon}&message=true`;
            
            // Toggle active visual element class styling
            document.querySelectorAll('.windy-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
        }

        // --- Data Fetching APIs ---
        function fetchNWSForecast() {
            fetch(`https://api.weather.gov/points/${localLat},${localLon}`)
                .then(res => res.json())
                .then(d => fetch(d.properties.forecast))
                .then(res => res.json())
                .then(data => {
                    const periods = data.properties.periods;
                    let html = '';
                    const obsEl = document.getElementById('current-obs');
                    const cardEl = document.getElementById('forecast-cards');
                    
                    if(obsEl) obsEl.innerHTML = `<h3 style="margin:0 0 5px 0;">CURRENT WEATHER</h3><span style="color:#fff; font-size:1.1rem;">${periods[0].temperature}°${periods[0].temperatureUnit} — ${periods[0].shortForecast}</span>`;
                    
                    periods.forEach((p, i) => {
                        if(i < 8) {
                            html += `<div class="forecast-card"><div style="color:#8b949e; font-size:0.8rem;">${p.name}</div><img src="${p.icon}"><div class="${p.isDaytime?'temp-high':'temp-low'}">${p.temperature}°${p.temperatureUnit}</div></div>`;
                        }
                    });
                    if(cardEl) cardEl.innerHTML = html;
                }).catch(() => {
                    const el = document.getElementById('current-obs');
                    if(el) el.innerText = "NWS server network timeout.";
                });
        }

        function fetchNWSAlerts() {
            fetch('https://api.weather.gov/alerts/active?area=PA')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('alerts-container');
                    if(!container) return;
                    if(data.features.length === 0) { container.innerHTML = "<span style='color:#00ff55;'>✓ SYSTEM SCAN: NO ACTIVE WATCHES / WARNINGS REPORTED</span>"; return; }
                    let html = '';
                    data.features.forEach(f => {
                        html += `<div class="alert-item"><div class="alert-title">${f.properties.event}</div><div style="font-size:0.8rem; color:#8b949e; margin:3px 0;">${f.properties.headline}</div></div>`;
                    });
                    container.innerHTML = html;
                }).catch(() => {
                    const el = document.getElementById('alerts-container');
                    if(el) el.innerHTML = "<span style='color:#ff5555;'>Alert collection link broken.</span>";
                });
        }

        function fetchSchuylkillHydrology() {
            const siteIds = schuylkillGauges.map(g => g.id).join(',');
            fetch(`https://waterservices.usgs.gov/nwis/iv/?format=json&sites=${siteIds}&parameterCd=00065`)
                .then(res => res.json())
                .then(data => {
                    let html = '<h3 style="margin-top:0; color:#00ffcc; letter-spacing:1px;">SCHUYLKILL HYDRO-CORRIDOR TELEMETRY</h3>';
                    const list = data.value.timeSeries;
                    
                    schuylkillGauges.forEach(g => {
                        const matched = list.find(ts => ts.sourceInfo.siteCode[0].value === g.id);
                        const height = matched?.values[0]?.value[0]?.value || "N/A";
                        html += `
                            <div class="gauge-card">
                                <div style="font-weight:bold; color:#fff; font-size:0.95rem;">${g.name}</div>
                                <div style="color:#00ffcc; margin:5px 0; font-size:0.9rem;"><i class="fa-solid fa-water"></i> CURRENT STAGE: ${height} FT</div>
                                <a class="gauge-link" href="https://waterdata.usgs.gov/monitoring-location/${g.id}/#parameterCode=00065&period=P7D" target="_blank" rel="noopener noreferrer">
                                    Analyze Site Station ${g.id} Metrics ↗
                                </a>
                            </div>`;
                    });
                    const container = document.getElementById('hydro-river-list');
                    if(container) container.innerHTML = html;
                }).catch(() => {
                    const el = document.getElementById('hydro-river-list');
                    if(el) el.innerText = "USGS Telemetry data pool unreachable.";
                });
        }

        // --- Global Clockwork Loop Execution ---
        setInterval(() => {
            countdownVal--;
            if(countdownVal <= 0) {
                countdownVal = 120;
                fetchNWSForecast();
                fetchNWSAlerts();
                fetchSchuylkillHydrology();
            }
            const timerEl = document.getElementById('countdown');
            if(timerEl) timerEl.innerText = countdownVal;
        }, 1000);

        window.addEventListener('resize', () => { layout.updateSize(); });
    </script>
</body>
</html>
